name: Dispatch mirror sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: kb-mirror-controller
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      ORG: ChatGPT-KB
      GH_TOKEN: ${{ secrets.KB_ORG_DISPATCH_TOKEN }}
    steps:
      - name: Check out index repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv (latest)
        shell: bash
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" --version

      - name: Evaluate due mirrors
        id: evaluate
        shell: bash
        run: |
          set -euo pipefail
          uv run --with pyyaml --with croniter python scripts/evaluate_mirror_schedule.py             --global-config .chatgpt/mirror-sync.global.yml             --mirrors-config .chatgpt/mirror-sync.mirrors.yml             --org "$ORG" > due.json

          due_count="$(python -c 'import json;from pathlib import Path;print(len(json.loads(Path("due.json").read_text(encoding="utf-8")).get("due", [])))')"
          echo "due_count=$due_count" >> "$GITHUB_OUTPUT"

      - name: Dispatch mirror workflows
        if: steps.evaluate.outputs.due_count != '0'
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/dispatch_due_mirrors.py --due-json due.json

      - name: Write summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          uv run python scripts/write_dispatch_summary.py --due-json due.json --summary-path "$GITHUB_STEP_SUMMARY"
